security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    role_hierarchy:
        ROLE_DEPT_ADMIN:  [ROLE_USER]
        ROLE_SUPER_ADMIN: [ROLE_DEPT_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api/
            stateless: true
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppCustomAuthenticator
            logout:
                path: app_logout
                target: http://localhost:3000/connexion-admin
                invalidate_session: true
                delete_cookies: ['PHPSESSID']

    access_control:
        - { path: ^/api/admin-auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_USER }